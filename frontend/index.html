<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayos Cósmicos - Sistema de Monitoreo UMSA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f1b4a 0%, #1b2d7f 50%, #2f3e8c 100%);
      background-attachment: fixed;
      color: #e0e7ff;
    }
    #app {
      width: 100%;
      min-height: 100%;
    }
    .loading {
      text-align: center;
    }
    .loading h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #3d5aff 0%, #7d9ff0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(61, 90, 255, 0.2);
      border-top-color: #3d5aff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <h1>Rayos Cosmicos</h1>
      <div class="spinner"></div>
      <p>Cargando aplicacion...</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
